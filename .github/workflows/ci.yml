name: CI

on:
  push:
    branches: ["master", "phase-*"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build:
    name: Build & test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["21", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & unit tests
        run: ./gradlew --no-daemon build

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: |
            **/build/reports/tests
            **/build/test-results

  integration:
    name: Integration tests (Kafka ${{ matrix.kafka }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        kafka: ["4.2.0"]
    services:
      kafka:
        image: apache/kafka:${{ matrix.kafka }}
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          # KIP-932 share-group support: enable the share group coordinator
          # protocol alongside classic + consumer, and turn on the broker-side
          # share-group + share-coordinator subsystems. Keep this block IN SYNC
          # with .github/workflows/release.yml (same broker config exercises the
          # same code paths).
          KAFKA_GROUP_COORDINATOR_REBALANCE_PROTOCOLS: classic,consumer,share
          KAFKA_SHARE_GROUP_ENABLE: "true"
          KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
          # New share groups start at the earliest available offset (consistent
          # with integration tests that produce before subscribe).
          KAFKA_SHARE_AUTO_OFFSET_RESET: earliest
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Wait for Kafka
        run: |
          for i in {1..30}; do
            if nc -z localhost 9092; then echo "Kafka ready"; exit 0; fi
            sleep 2
          done
          echo "Kafka never came up"
          exit 1

      - name: Run integration tests
        # --rerun-tasks belt-and-suspenders: combined with the cacheIf { false }
        # in {core,metrics}/build.gradle.kts, guarantees the live suite actually
        # executes against the spun-up Kafka service even on a clean clone with a
        # warm remote cache. A cache hit here would silently turn the gate into
        # a no-op.
        run: ./gradlew --no-daemon --rerun-tasks :core:test :metrics:test -PintegrationTests=true

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-reports-kafka${{ matrix.kafka }}
          path: |
            **/build/reports/tests
            **/build/test-results

  publish-snapshot:
    name: Publish SNAPSHOT
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check snapshot version
        id: snapshot-version
        # Guard: Gradle's publish task selects the release Sonatype URL whenever
        # the version doesn't end with -SNAPSHOT (see build.gradle.kts publishing
        # block). Master may temporarily carry a release version while preparing a tag;
        # in that case CI should stay green but snapshot publishing must be skipped.
        run: |
          ver=$(./gradlew --no-daemon -q properties | grep -E "^version:" | awk '{print $2}')
          if [[ "$ver" != *-SNAPSHOT ]]; then
            echo "Version $ver is not a SNAPSHOT; skipping snapshot publish."
            echo "publish_snapshot=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "publish_snapshot=true" >> "$GITHUB_OUTPUT"
          echo "Version $ver is a SNAPSHOT; proceeding."

      - name: Publish to Central Portal snapshots
        if: steps.snapshot-version.outputs.publish_snapshot == 'true'
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          # Only run if credentials are configured (early adopters won't have them).
          if [ -z "$SONATYPE_USERNAME" ]; then
            echo "SONATYPE_USERNAME not set; skipping publish."
            exit 0
          fi
          ./gradlew --no-daemon publishLibraryPublicationToSonatypeRepository
